apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-tenjin-pulse-master
  labels:
    app: {{ .Release.Name }}-tenjin-pulse-master
spec:
  type: {{ .Values.Master.service.type | default "ClusterIP" }}  # Ensure this is set in values.yaml
  selector:
    app: {{ .Release.Name }}-tenjin-pulse-master
  ports:
    - name: rmi
      port: 1099
      targetPort: 1099
      protocol: TCP
    - name: communication
      port: 60000
      targetPort: 60000
      protocol: TCP
