apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-tenjin-pulse-vts
  labels:
    name: {{ .Release.Name }}-tenjin-pulse-vts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-tenjin-pulse-vts
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-tenjin-pulse-vts
    spec:
      containers:
        - name: jmeter-vts
          image: performancetesting/opentext_vts_linux_ubuntu:24.3
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "500Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: VTS_HOST
              value: "0.0.0.0"
            - name: VTS_PORT
              value: "8080"
